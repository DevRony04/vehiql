name: Continuous Delivery

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Downcase Image Name
        id: downcase
        run: |
          # Convert repository name to lowercase for Docker compatibility
          RAW_IMAGE="ghcr.io/${{ github.repository }}"
          LOWER_IMAGE=$(echo "$RAW_IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "LOWER_IMAGE=$LOWER_IMAGE" >> $GITHUB_ENV
          echo "LOWER_IMAGE=$LOWER_IMAGE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.LOWER_IMAGE }}:latest
            ${{ env.LOWER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS (Production)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: http://${{ secrets.VPS_HOST }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Downcase Image Name
        run: |
          RAW_IMAGE="ghcr.io/${{ github.repository }}"
          LOWER_IMAGE=$(echo "$RAW_IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "LOWER_IMAGE=$LOWER_IMAGE" >> $GITHUB_ENV

      # Transfer docker-compose.prod.yml and scripts/deploy.sh to VPS
      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml,scripts/deploy.sh"
          target: "~/vehiql-deploy"

      # Execute deploy script on VPS
      - name: Deploy and Verify via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/vehiql-deploy
            cd ~/vehiql-deploy
            
            # Write target environment variables to .env
            cat << 'EOF' > .env
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=${{ secrets.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ARCJET_KEY=${{ secrets.ARCJET_KEY }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            EOF
            
            # Make deployment script executable
            chmod +x scripts/deploy.sh
            
            # Execute deployment script
            bash scripts/deploy.sh "." "${{ env.LOWER_IMAGE }}:sha-${{ github.sha }}"
