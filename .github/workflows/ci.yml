name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  # Sandboxed Environment Variables for Validate and Build steps
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vehiql_mock
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/vehiql_mock
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_a2luZC1idWZmYWxvLTgxLmNsZXJrLmFjY291bnRzLmRldiQ
  CLERK_SECRET_KEY: sk_test_mocksecret12345
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
  NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /
  NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /
  NEXT_PUBLIC_SUPABASE_URL: https://mockproject.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mockanonkey
  SUPABASE_SERVICE_ROLE_KEY: mockservicerolekey
  GEMINI_API_KEY: mockgeminiapikey
  ARCJET_KEY: ajkey_mockkey12345
  NEXTAUTH_SECRET: mocknextauthsecret12345
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-and-validate:
    name: Lint & Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint codebase
        run: npm run lint

  build-verification:
    name: Next.js Production Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache npm dependencies and Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js standalone application
        run: npm run build

  docker-validate:
    name: Docker Image Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: vehiql-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Dependency & Code Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (Audit high/critical vulnerabilities)
        run: npm audit --audit-level=high

      - name: Run Trivy FS vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
